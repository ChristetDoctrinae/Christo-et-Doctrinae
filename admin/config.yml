# ================================================================
# Netlify CMS Configuration — Christo et Doctrinae
# ================================================================
# To use the CMS:
#   1. Connect this site to Netlify
#   2. Enable Netlify Identity (Site > Identity > Enable)
#   3. Enable Git Gateway (Identity > Services > Enable Git Gateway)
#   4. Invite editors via Site > Identity > Invite Users
#   5. Visit /admin to manage content
# ================================================================

backend:
  name: git-gateway
  branch: main

# Where uploaded images are stored and served from
media_folder: "images/uploads"
public_folder: "/images/uploads"

# ----------------------------------------------------------------
# Collections
# ----------------------------------------------------------------
collections:

  # --------------------------------------------------------------
  # ARTICLES — editors create, edit, and delete articles here
  # Each article is stored as a markdown file in content/articles/
  # The build.js script converts these to data/articles.json so
  # the homepage automatically shows the 3 most recent articles.
  # --------------------------------------------------------------
  - name: "articles"
    label: "Articles"
    label_singular: "Article"
    folder: "content/articles"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{author}} ({{date}})"
    sortable_fields: ["date", "title", "author"]
    view_filters:
      - label: "Holy Week Series"
        field: series
        pattern: "Holy Week Series"
      - label: "Advent Series"
        field: series
        pattern: "Advent Series"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "The article's main title"

      - label: "Subtitle"
        name: "subtitle"
        widget: "string"
        required: false
        hint: "A short description or deck shown beneath the title"

      - label: "Author"
        name: "author"
        widget: "string"
        hint: "Author's full name"

      - label: "Publication Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        hint: "Date the article was or will be published"

      - label: "Series"
        name: "series"
        widget: "select"
        options:
          - "Holy Week Series"
          - "Advent Series"
          - "Theology & Culture"
          - "Faith & Reason"
          - "Spiritual Formation"
          - "Art & Theology"
          - "Christian Ethics"
          - "The Saints"
        required: false
        hint: "Which series does this article belong to? Leave blank if none."

      - label: "Print Edition"
        name: "print_edition"
        widget: "string"
        required: false
        hint: "e.g. Spring 2025 — leave blank for digital-only articles"

      - label: "Cover Image"
        name: "cover_image"
        widget: "image"
        required: false
        hint: "Upload a cover/feature image for this article"
        media_library:
          config:
            multiple: false

      - label: "Article Content"
        name: "body"
        widget: "markdown"
        hint: "Write or paste the full article content here. Use the toolbar to format text, add headings, and insert images."

  # --------------------------------------------------------------
  # TEAM — admin manages the team page here
  # Edits are written directly to data/team.json
  # The about page loads this file via JavaScript
  # --------------------------------------------------------------
  - name: "team"
    label: "Team Members"
    files:
      - label: "About Page — Team"
        name: "team"
        file: "data/team.json"
        format: "json"
        fields:
          - label: "Editor in Chief"
            name: "editor_in_chief"
            widget: "object"
            summary: "{{fields.name}}"
            fields:
              - { label: "Name",            name: "name",     widget: "string" }
              - { label: "Title",           name: "title",    widget: "string", default: "Editor in Chief" }
              - { label: "Major of Study",  name: "major",    widget: "string" }
              - { label: "Year at School",  name: "year",     widget: "string", hint: "e.g. Class of 2025" }
              - { label: "Hometown & State",name: "hometown", widget: "string", hint: "e.g. Nashville, TN" }

          - label: "Managing Editor"
            name: "managing_editor"
            widget: "object"
            summary: "{{fields.name}}"
            fields:
              - { label: "Name",            name: "name",     widget: "string" }
              - { label: "Title",           name: "title",    widget: "string", default: "Managing Editor" }
              - { label: "Major of Study",  name: "major",    widget: "string" }
              - { label: "Year at School",  name: "year",     widget: "string" }
              - { label: "Hometown & State",name: "hometown", widget: "string" }

          - label: "Chief of Design"
            name: "chief_of_design"
            widget: "object"
            summary: "{{fields.name}}"
            fields:
              - { label: "Name",            name: "name",     widget: "string" }
              - { label: "Title",           name: "title",    widget: "string", default: "Chief of Design" }
              - { label: "Major of Study",  name: "major",    widget: "string" }
              - { label: "Year at School",  name: "year",     widget: "string" }
              - { label: "Hometown & State",name: "hometown", widget: "string" }

          - label: "Contributors"
            name: "contributors"
            widget: "list"
            label_singular: "Contributor"
            summary: "{{fields.name}} — {{fields.title}}"
            min: 0
            max: 20
            fields:
              - { label: "Name",            name: "name",     widget: "string" }
              - { label: "Title",           name: "title",    widget: "string", hint: "e.g. Senior Editor, Copy Editor, Contributing Editor" }
              - { label: "Major of Study",  name: "major",    widget: "string" }
              - { label: "Year at School",  name: "year",     widget: "string", hint: "e.g. Class of 2026" }
              - { label: "Hometown & State",name: "hometown", widget: "string", hint: "e.g. Atlanta, GA" }

  # --------------------------------------------------------------
  # SETTINGS — admin updates site-wide settings here
  # --------------------------------------------------------------
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Contact Settings"
        name: "settings"
        file: "data/settings.json"
        format: "json"
        fields:
          - label: "Editor in Chief Email"
            name: "editor_email"
            widget: "string"
            hint: "This email is displayed in the Contact section of the About page"
            pattern:
              - ".+@.+"
              - "Must be a valid email address"
