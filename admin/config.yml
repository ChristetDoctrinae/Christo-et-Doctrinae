# ================================================================
# Netlify CMS Configuration — Christo et Doctrinae
# ================================================================
# To activate:
#   1. Connect repo to Netlify
#   2. Site > Identity > Enable Identity
#   3. Identity > Services > Enable Git Gateway
#   4. Invite editors via Identity > Invite Users
#   5. Visit /admin
# ================================================================

backend:
  name: git-gateway
  branch: main

# ----------------------------------------------------------------
# Media Library — drag-and-drop image uploads
# ----------------------------------------------------------------
media_folder: "images/uploads"
public_folder: "/images/uploads"

media_library:
  name: default
  folder_support: true

# ----------------------------------------------------------------
# Collections
# ----------------------------------------------------------------
collections:

  # ------------------------------------------------------------
  # TAGS — create and delete tags here; articles reference them
  # ------------------------------------------------------------
  - name: "tags"
    label: "Tags"
    label_singular: "Tag"
    folder: "content/tags"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{name}}"
    fields:
      - label: "Tag Name"
        name: "name"
        widget: "string"
        hint: "Use lowercase, e.g. theology, art, culture, poetry"

  # ------------------------------------------------------------
  # ARTICLES — create, edit, publish articles
  # ------------------------------------------------------------
  - name: "articles"
    label: "Articles"
    label_singular: "Article"
    folder: "content/articles"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{title}} — {{author}} ({{date}})"
    sortable_fields: ["date", "title", "author"]
    view_filters:
      - label: "Online Articles"
        field: series
        pattern: "^$"
      - label: "Holy Week Series"
        field: series
        pattern: "Holy Week Series"
      - label: "Advent Series"
        field: series
        pattern: "Advent Series"
      - label: "Print Edition"
        field: print_edition
        pattern: "."
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "The article's main title"

      - label: "Subtitle"
        name: "subtitle"
        widget: "string"
        required: false
        hint: "A short description shown beneath the title on cards and the article page"

      - label: "Author"
        name: "author"
        widget: "string"
        hint: "Author's full name (student authors only)"

      - label: "Publication Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "MMMM D, YYYY"
        time_format: false
        hint: "Date the article was or will be published"

      - label: "Tags"
        name: "tags"
        widget: "relation"
        collection: "tags"
        search_fields: ["name"]
        value_field: "name"
        display_fields: ["name"]
        multiple: true
        min: 0
        max: 3
        required: false
        hint: "Select up to 3 tags. To add new tags, go to the Tags section first."

      - label: "Series"
        name: "series"
        widget: "select"
        options:
          - { label: "None (online article)", value: "" }
          - { label: "Holy Week Series", value: "Holy Week Series" }
          - { label: "Advent Series", value: "Advent Series" }
        default: ""
        required: false
        hint: "Series articles appear in the Series section, not the main Articles page"

      - label: "Print Edition"
        name: "print_edition"
        widget: "string"
        required: false
        hint: "e.g. Spring 2025 — leave blank for digital/online articles"

      - label: "Cover Image"
        name: "cover_image"
        widget: "image"
        required: false
        hint: "Upload a cover image (JPG, PNG, WEBP, or GIF). Drag and drop or click to browse."
        media_library:
          config:
            multiple: false

      - label: "Article Content"
        name: "body"
        widget: "markdown"
        hint: |
          Write or paste the full article here. Use the toolbar to format text.

          To add an image with positioning and a caption, use this format in the alt text:
          • left|Your caption here  → floats image left, text wraps right
          • right|Your caption here → floats image right, text wraps left
          • full|Your caption here  → full-width image
          • center|Your caption    → centered image (default)

          Example: ![left|The chapel at dawn](images/uploads/chapel.jpg)

  # ------------------------------------------------------------
  # FEATURED ARTICLES — select up to 2 articles for the homepage
  # ------------------------------------------------------------
  - name: "featured"
    label: "Featured Articles"
    files:
      - label: "Homepage Featured Articles"
        name: "featured"
        file: "data/featured.json"
        format: "json"
        fields:
          - label: "Featured Articles (select up to 2)"
            name: "featured_articles"
            widget: "relation"
            collection: "articles"
            search_fields: ["title", "author"]
            value_field: "slug"
            display_fields: ["title"]
            multiple: true
            min: 0
            max: 2
            required: false
            hint: "Select up to 2 articles to feature on the homepage. Maximum 2 — deselect one before selecting another."

  # ------------------------------------------------------------
  # TEAM — edit team member tiles on the About page
  # ------------------------------------------------------------
  - name: "team"
    label: "Team Members"
    files:
      - label: "About Page — Team"
        name: "team"
        file: "data/team.json"
        format: "json"
        fields:
          - label: "Editor in Chief"
            name: "editor_in_chief"
            widget: "object"
            summary: "{{fields.name}}"
            fields:
              - { label: "Name",            name: "name",     widget: "string" }
              - { label: "Title",           name: "title",    widget: "string", default: "Editor in Chief" }
              - { label: "Major of Study",  name: "major",    widget: "string" }
              - { label: "Year at School",  name: "year",     widget: "string", hint: "e.g. Class of 2025" }
              - { label: "Hometown & State",name: "hometown", widget: "string", hint: "e.g. Nashville, TN" }

          - label: "Managing Editor"
            name: "managing_editor"
            widget: "object"
            summary: "{{fields.name}}"
            fields:
              - { label: "Name",            name: "name",     widget: "string" }
              - { label: "Title",           name: "title",    widget: "string", default: "Managing Editor" }
              - { label: "Major of Study",  name: "major",    widget: "string" }
              - { label: "Year at School",  name: "year",     widget: "string" }
              - { label: "Hometown & State",name: "hometown", widget: "string" }

          - label: "Chief of Design"
            name: "chief_of_design"
            widget: "object"
            summary: "{{fields.name}}"
            fields:
              - { label: "Name",            name: "name",     widget: "string" }
              - { label: "Title",           name: "title",    widget: "string", default: "Chief of Design" }
              - { label: "Major of Study",  name: "major",    widget: "string" }
              - { label: "Year at School",  name: "year",     widget: "string" }
              - { label: "Hometown & State",name: "hometown", widget: "string" }

          - label: "Contributors"
            name: "contributors"
            widget: "list"
            label_singular: "Contributor"
            summary: "{{fields.name}} — {{fields.title}}"
            min: 0
            max: 20
            fields:
              - { label: "Name",            name: "name",     widget: "string" }
              - { label: "Title",           name: "title",    widget: "string" }
              - { label: "Major of Study",  name: "major",    widget: "string" }
              - { label: "Year at School",  name: "year",     widget: "string" }
              - { label: "Hometown & State",name: "hometown", widget: "string" }

  # ------------------------------------------------------------
  # SUBMISSIONS — edit deadlines and guidelines
  # ------------------------------------------------------------
  - name: "submissions"
    label: "Submissions Page"
    files:
      - label: "Deadlines & Guidelines"
        name: "submissions"
        file: "data/submissions.json"
        format: "json"
        fields:
          - label: "Current Deadline Text"
            name: "deadline_text"
            widget: "text"
            hint: "This appears in the info box at the top of the Submissions page"

          - label: "Scholarly & Critical Writing Guidelines"
            name: "scholarly_guidelines"
            widget: "list"
            label_singular: "Guideline"
            field: { label: "Guideline", name: "item", widget: "string" }

          - label: "Creative Writing & Poetry Guidelines"
            name: "creative_guidelines"
            widget: "list"
            label_singular: "Guideline"
            field: { label: "Guideline", name: "item", widget: "string" }

          - label: "Visual Art & Photography Guidelines"
            name: "visual_guidelines"
            widget: "list"
            label_singular: "Guideline"
            field: { label: "Guideline", name: "item", widget: "string" }

          - label: "Eligibility & Process Guidelines"
            name: "eligibility_guidelines"
            widget: "list"
            label_singular: "Guideline"
            field: { label: "Guideline", name: "item", widget: "string" }

  # ------------------------------------------------------------
  # SETTINGS — editor email and other site-wide settings
  # ------------------------------------------------------------
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Contact Settings"
        name: "settings"
        file: "data/settings.json"
        format: "json"
        fields:
          - label: "Editor in Chief Email"
            name: "editor_email"
            widget: "string"
            hint: "Displayed in the Contact section of the About page"
            pattern:
              - ".+@.+"
              - "Must be a valid email address"
