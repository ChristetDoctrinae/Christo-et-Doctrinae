# ================================================================
# Netlify CMS Configuration — Christo et Doctrinae
# ================================================================
# To activate:
#   1. Connect repo to Netlify
#   2. Site > Identity > Enable Identity
#   3. Identity > Services > Enable Git Gateway
#   4. Invite editors via Identity > Invite Users
#   5. Visit /admin
# ================================================================

backend:
  name: git-gateway
  branch: main

# ----------------------------------------------------------------
# Media Library — drag-and-drop image uploads
# ----------------------------------------------------------------
media_folder: "images/uploads"
public_folder: "/images/uploads"

# ----------------------------------------------------------------
# Collections
# ----------------------------------------------------------------
collections:

  # ------------------------------------------------------------
  # SERIES — create and manage series; articles reference them
  # ------------------------------------------------------------
  - name: "series"
    label: "Series"
    label_singular: "Series"
    folder: "content/series"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{name}}"
    fields:
      - label: "Series Name"
        name: "name"
        widget: "string"
        hint: "The full series name, e.g. 'Holy Week Series' or 'The Saints'"

      - label: "Is Yearly Series?"
        name: "is_yearly"
        widget: "boolean"
        default: false
        hint: "Yearly series (e.g. Holy Week, Advent) group articles by year on the series page. Non-yearly series show a flat list of all articles."

      - label: "Description"
        name: "description"
        widget: "text"
        required: false
        hint: "Brief description shown on the Series page (1–3 sentences)"

  # ------------------------------------------------------------
  # TAGS — create and delete tags here; articles reference them
  # ------------------------------------------------------------
  - name: "tags"
    label: "Tags"
    label_singular: "Tag"
    folder: "content/tags"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{name}}"
    fields:
      - label: "Tag Name"
        name: "name"
        widget: "string"
        hint: "Use lowercase, e.g. theology, art, culture, poetry"

  # ------------------------------------------------------------
  # ARTICLES — create, edit, publish articles
  # ------------------------------------------------------------
  - name: "articles"
    label: "Articles"
    label_singular: "Article"
    folder: "content/articles"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{title}} — {{author}} ({{date}})"
    sortable_fields: ["date", "title", "author"]
    view_filters:
      - label: "Online Articles"
        field: series
        pattern: "^$"
      - label: "Holy Week Series"
        field: series
        pattern: "Holy Week Series"
      - label: "Advent Series"
        field: series
        pattern: "Advent Series"
      - label: "Print Edition"
        field: print_edition
        pattern: "."
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "The article's main title"

      - label: "Subtitle"
        name: "subtitle"
        widget: "string"
        required: false
        hint: "A short description shown beneath the title on cards and the article page"

      - label: "Author"
        name: "author"
        widget: "string"
        hint: "Author's full name (student authors only)"

      - label: "Publication Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "MMMM D, YYYY"
        time_format: false
        hint: "The display date for the article (shown to readers)"

      - label: "Scheduled Publish Date"
        name: "publish_date"
        widget: "datetime"
        format: "YYYY-MM-DDTHH:mm"
        date_format: "MMMM D, YYYY"
        time_format: "h:mm A"
        required: false
        hint: "Leave blank to publish immediately on next deploy. Set a future date and time to schedule — the article will be hidden until a site rebuild after this date. Note: a manual deploy or scheduled build hook is required to automatically publish at the set time."

      - label: "Tags"
        name: "tags"
        widget: "relation"
        collection: "tags"
        search_fields: ["name"]
        value_field: "name"
        display_fields: ["name"]
        multiple: true
        min: 0
        max: 3
        required: false
        hint: "Select up to 3 tags. To add new tags, go to the Tags section first."

      - label: "Series"
        name: "series"
        widget: "relation"
        collection: "series"
        search_fields: ["name"]
        value_field: "name"
        display_fields: ["name"]
        multiple: false
        required: false
        hint: "Select the series this article belongs to. To create a new series, go to the Series section first, then return here."

      - label: "Series Year"
        name: "series_year"
        widget: "string"
        required: false
        hint: "For yearly series only (e.g. Holy Week, Advent): enter the year, e.g. 2025. Leave blank for non-yearly series."

      - label: "Print Edition"
        name: "print_edition"
        widget: "string"
        required: false
        hint: "e.g. Spring 2025 — leave blank for digital/online articles"

      - label: "Cover Image"
        name: "cover_image"
        widget: "image"
        required: false
        hint: "Upload a cover image (JPG, PNG, WEBP, or GIF). This image will appear as the thumbnail wherever this article is listed."

      - label: "Cover Image Focal Point"
        name: "focal_point"
        widget: "select"
        required: false
        default: "center"
        options:
          - { label: "Center (default)", value: "center" }
          - { label: "Top",              value: "top" }
          - { label: "Bottom",           value: "bottom" }
          - { label: "Left",             value: "left" }
          - { label: "Right",            value: "right" }
          - { label: "Top Left",         value: "top-left" }
          - { label: "Top Right",        value: "top-right" }
          - { label: "Bottom Left",      value: "bottom-left" }
          - { label: "Bottom Right",     value: "bottom-right" }
        hint: "Which part of the cover image should stay in frame when cropped to a thumbnail card?"

      - label: "Article Content"
        name: "body"
        widget: "markdown"
        hint: |
          Write or paste the full article here. Use the toolbar to format text.

          To add an image with positioning and a caption, use this format in the alt text:
          • left|Your caption here  → floats image left, text wraps right
          • right|Your caption here → floats image right, text wraps left
          • full|Your caption here  → full-width image
          • center|Your caption    → centered image (default)

          Example: ![left|The chapel at dawn](images/uploads/chapel.jpg)

  # ------------------------------------------------------------
  # FEATURED ARTICLES — select up to 2 articles for the homepage
  # ------------------------------------------------------------
  - name: "featured"
    label: "Featured Articles"
    files:
      - label: "Homepage Featured Articles"
        name: "featured"
        file: "data/featured.json"
        format: "json"
        fields:
          - label: "Featured Articles (select up to 2)"
            name: "featured_articles"
            widget: "relation"
            collection: "articles"
            search_fields: ["title", "author"]
            value_field: "slug"
            display_fields: ["title"]
            multiple: true
            min: 0
            max: 2
            required: false
            hint: "Select up to 2 articles to feature on the homepage. Maximum 2 — deselect one before selecting another."

  # ------------------------------------------------------------
  # TEAM — edit team member tiles on the About page
  # ------------------------------------------------------------
  - name: "team"
    label: "Team Members"
    files:
      - label: "About Page — Team"
        name: "team"
        file: "data/team.json"
        format: "json"
        fields:
          - label: "Editor in Chief"
            name: "editor_in_chief"
            widget: "object"
            summary: "{{fields.name}}"
            fields:
              - { label: "Name",            name: "name",     widget: "string" }
              - { label: "Title",           name: "title",    widget: "string", default: "Editor in Chief" }
              - { label: "Major of Study",  name: "major",    widget: "string" }
              - { label: "Year at School",  name: "year",     widget: "string", hint: "e.g. Class of 2025" }
              - { label: "Hometown & State",name: "hometown", widget: "string", hint: "e.g. Nashville, TN" }

          - label: "Managing Editor"
            name: "managing_editor"
            widget: "object"
            summary: "{{fields.name}}"
            fields:
              - { label: "Name",            name: "name",     widget: "string" }
              - { label: "Title",           name: "title",    widget: "string", default: "Managing Editor" }
              - { label: "Major of Study",  name: "major",    widget: "string" }
              - { label: "Year at School",  name: "year",     widget: "string" }
              - { label: "Hometown & State",name: "hometown", widget: "string" }

          - label: "Chief of Design"
            name: "chief_of_design"
            widget: "object"
            summary: "{{fields.name}}"
            fields:
              - { label: "Name",            name: "name",     widget: "string" }
              - { label: "Title",           name: "title",    widget: "string", default: "Chief of Design" }
              - { label: "Major of Study",  name: "major",    widget: "string" }
              - { label: "Year at School",  name: "year",     widget: "string" }
              - { label: "Hometown & State",name: "hometown", widget: "string" }

          - label: "Contributors"
            name: "contributors"
            widget: "list"
            label_singular: "Contributor"
            summary: "{{fields.name}} — {{fields.title}}"
            min: 0
            max: 20
            fields:
              - { label: "Name",            name: "name",     widget: "string" }
              - { label: "Title",           name: "title",    widget: "string" }
              - { label: "Major of Study",  name: "major",    widget: "string" }
              - { label: "Year at School",  name: "year",     widget: "string" }
              - { label: "Hometown & State",name: "hometown", widget: "string" }

  # ------------------------------------------------------------
  # SUBMISSIONS — edit deadlines and guidelines
  # ------------------------------------------------------------
  - name: "submissions"
    label: "Submissions Page"
    files:
      - label: "Deadlines & Guidelines"
        name: "submissions"
        file: "data/submissions.json"
        format: "json"
        fields:
          - label: "Current Deadline Text"
            name: "deadline_text"
            widget: "text"
            hint: "This appears in the info box at the top of the Submissions page"

          - label: "Scholarly & Critical Writing Guidelines"
            name: "scholarly_guidelines"
            widget: "list"
            label_singular: "Guideline"
            field: { label: "Guideline", name: "item", widget: "string" }

          - label: "Creative Writing & Poetry Guidelines"
            name: "creative_guidelines"
            widget: "list"
            label_singular: "Guideline"
            field: { label: "Guideline", name: "item", widget: "string" }

          - label: "Visual Art & Photography Guidelines"
            name: "visual_guidelines"
            widget: "list"
            label_singular: "Guideline"
            field: { label: "Guideline", name: "item", widget: "string" }

          - label: "Eligibility & Process Guidelines"
            name: "eligibility_guidelines"
            widget: "list"
            label_singular: "Guideline"
            field: { label: "Guideline", name: "item", widget: "string" }

  # ------------------------------------------------------------
  # PRINT EDITIONS — manage each print edition
  # ------------------------------------------------------------
  - name: "print_editions"
    label: "Print Editions"
    label_singular: "Print Edition"
    folder: "content/editions"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{title}} — {{theme}} ({{season}})"
    sortable_fields: ["volume_number", "season"]
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "e.g. Volume III"

      - label: "Theme"
        name: "theme"
        widget: "string"
        hint: "The edition's thematic title, e.g. Love & Justice"

      - label: "Season / Date"
        name: "season"
        widget: "string"
        hint: "e.g. Spring 2025"

      - label: "Volume Number"
        name: "volume_number"
        widget: "number"
        value_type: "int"
        hint: "Used to sort editions — higher number = more recent"

      - label: "Page Count"
        name: "page_count"
        widget: "number"
        value_type: "int"
        required: false

      - label: "Contents"
        name: "contents"
        widget: "string"
        required: false
        hint: "Short summary of contents, e.g. 9 essays · 5 poems · 1 short story · Perfect bound"

      - label: "Description"
        name: "description"
        widget: "text"
        required: false
        hint: "1–3 sentence description of the edition shown on the Print Editions page"

      - label: "PDF File"
        name: "pdf_file"
        widget: "file"
        required: false
        hint: "Upload the PDF of this edition. When set, clicking the edition will open the flipbook viewer."
        default: ""

  # ------------------------------------------------------------
  # SETTINGS — editor email and other site-wide settings
  # ------------------------------------------------------------
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Contact Settings"
        name: "settings"
        file: "data/settings.json"
        format: "json"
        fields:
          - label: "Editor in Chief Email"
            name: "editor_email"
            widget: "string"
            hint: "Displayed in the Contact section of the About page"
            pattern:
              - ".+@.+"
              - "Must be a valid email address"
