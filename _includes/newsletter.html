<section class="newsletter-panel" aria-labelledby="newsletter-heading">
  <span class="eyebrow">Stay Connected</span>
  <h2 id="newsletter-heading">Subscribe to the Journal</h2>
  <p class="newsletter-lead">Receive new articles, announcements, and reflections delivered to your inbox.</p>

  <form
    class="newsletter-form"
    action="https://christoetdoctrinae.us11.list-manage.com/subscribe/post?u=3bc3e9d5b8d4546b0de919934&amp;id=5fdbdbb188&amp;f_id=00d520e0f0"
    method="post"
    target="_blank"
    novalidate
  >
    <div class="name-row">
      <div class="nl-group">
        <label for="nl-fname-{{ include.id | default: 'default' }}">First Name</label>
        <input type="text" id="nl-fname-{{ include.id | default: 'default' }}" name="FNAME" placeholder="First name" />
      </div>
      <div class="nl-group">
        <label for="nl-lname-{{ include.id | default: 'default' }}">Last Name</label>
        <input type="text" id="nl-lname-{{ include.id | default: 'default' }}" name="LNAME" placeholder="Last name" />
      </div>
    </div>
    <div class="email-row">
      <div class="nl-group">
        <label for="nl-email-{{ include.id | default: 'default' }}">Email Address <span style="color: var(--accent);">*</span></label>
        <input type="email" id="nl-email-{{ include.id | default: 'default' }}" name="EMAIL" placeholder="your@email.com" required />
      </div>
    </div>
    <!-- Mailchimp anti-spam hidden field -->
    <div style="position: absolute; left: -5000px;" aria-hidden="true">
      <input type="text" name="b_3bc3e9d5b8d4546b0de919934_5fdbdbb188" tabindex="-1" value="" />
    </div>
    <div class="submit-row">
      <button type="submit" class="btn">Subscribe</button>
    </div>
  </form>
</section>
