# ================================================================
# Netlify Configuration — Christo et Doctrinae
# ================================================================

[build]
  # 1. tinacms build  → compiles the Tina admin app into ./admin/
  # 2. node build.js  → converts markdown content → data/*.json
  command = "npm run build"
  publish = "."

[build.environment]
  NODE_VERSION = "18"

# ----------------------------------------------------------------
# Cloudinary media proxy
# Routes /api/cloudinary[/*] to the Netlify Function that handles
# Cloudinary list / upload / delete for the Tina media library.
# ----------------------------------------------------------------
[[redirects]]
  from   = "/api/cloudinary"
  to     = "/.netlify/functions/cloudinary"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/cloudinary/*"
  to     = "/.netlify/functions/cloudinary"
  status = 200
  force  = true

# Security headers for the admin panel
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options      = "SAMEORIGIN"
    X-XSS-Protection     = "1; mode=block"
    X-Content-Type-Options = "nosniff"

# Cache-control for data files so the browser always fetches fresh content
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
