# ================================================================
# Netlify Configuration — Christo et Doctrinae
# ================================================================

[build]
  command   = "bundle exec jekyll build"
  publish   = "_site"

[build.environment]
  JEKYLL_ENV = "production"
  RUBY_VERSION = "3.2"

# ----------------------------------------------------------------
# Redirects — preserve old query-param URLs
# ----------------------------------------------------------------

# article.html?slug=X  →  /articles/X/
[[redirects]]
  from   = "/article.html"
  to     = "/articles/:slug"
  status = 301
  force  = true

# series-detail.html?series=X  →  /series/X/
[[redirects]]
  from   = "/series-detail.html"
  to     = "/series/:series"
  status = 301
  force  = true

# ----------------------------------------------------------------
# Security headers for admin panel
# ----------------------------------------------------------------
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"

# ----------------------------------------------------------------
# Cache control — never cache CMS data
# ----------------------------------------------------------------
[[headers]]
  for = "/_data/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
